server:
  port: 9669

spring:
  application:
    name: aps-lh
  # Spring Boot 2.6+ 默认 PathPatternParser，与 Springfox 2.9.x 不兼容会导致 documentationPluginsBootstrapper NPE
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    # 需要密码时取消注释：password: yourPassword
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aps_lh?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zlt.aps.lh.api.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.zlt.aps: debug
    com.zlt.aps.lh.mapper: debug
