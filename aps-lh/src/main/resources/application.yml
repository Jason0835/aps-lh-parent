server:
  port: 9669

# Knife4j 增强文档（基于 Springfox），生产环境可按需关闭
knife4j:
  enable: true

spring:
  application:
    name: aps-lh
  # Spring Boot 2.6+ 默认 PathPatternParser，与 Springfox 2.9.x 不兼容会导致 documentationPluginsBootstrapper NPE
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    # 需要密码时取消注释：password: yourPassword
  # 数据库：MySQL 5.7，库字符集 utf8mb4（JDBC 使用 characterEncoding=UTF-8）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: 'jdbc:mysql://16.162.95.221:3306/apslh?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=true&allowMultiQueries=true&serverTimezone=GMT%2B8'
    username: apslh
    password: '747452'
    # Hikari 连接池配置（核心：启动时自动校验数据库连接）
    hikari:
      # 启动时连接失败则直接抛出异常，阻止项目启动（关键配置）
      initialization-fail-timeout: 10000
      # 连接测试查询语句（MySQL专用，校验连接是否有效）
      connection-test-query: SELECT 1
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 15
      # 自动提交
      auto-commit: true
      # 空闲连接超时时间（毫秒）
      idle-timeout: 300000


mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zlt.aps.lh.api.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.zlt.aps: debug
    com.zlt.aps.lh.mapper: debug

aps:
  lh:
    validation:
      validators: {}
      # validators:
      #   monthPlanValidator: false
      #   machineInfoValidator: false
